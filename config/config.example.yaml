eastmoney:
  enabled: true
  limit: 50
  cutoff_hours: 24
  content_timeout: 10
  concurrency: 5

reporter:
  output_dir: "reports"

analyzer:
  enabled: true
  model: "gemini-3.1-pro-preview"
  fallback_model: "gemini-3-flash-preview"
  output_dir: "reports"
  batch_size: 50

notifier:
  enabled: true
  smtp_host: "smtp.qq.com"
  smtp_port: 465
  smtp_user: "your_qq_email@qq.com"
  smtp_password: "your_smtp_authorization_code"
  from_address: "your_email@example.com"
  to_addresses:
    - "recipient1@example.com"
    - "recipient2@example.com"
  subject_template: "财经分析报告 - {date} {window}"

scheduler:
  enabled: true
  timezone: "Asia/Shanghai"
  windows:
    - name: "overnight"
      start: "20:30"
      end:   "08:30"
    - name: "morning"
      start: "8:30"
      end:   "12:30"
    - name: "afternoon"
      start: "12:30"
      end:   "16:30"
    - name: "evening"
      start: "16:30"
      end:   "20:30"

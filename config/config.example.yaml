    language: "en"
  - name: "MarketWatch Top Stories"
    url: "https://feeds.content.dowjones.io/public/rss/mw_topstories"
    language: "en"
  - name: "36氪"
    url: "https://36kr.com/feed"
    language: "zh"
  - name: "Yahoo Finance"
    url: "https://finance.yahoo.com/news/rssindex"
    language: "en"

fred_series:
  - id: "DFII10"
    description: "10-Year Real Interest Rate (TIPS)"
    unit: "%"
  - id: "DTWEXBGS"
    description: "US Dollar Index (Broad)"
    unit: "index"
  - id: "DEXJPUS"
    description: "Japan/US Exchange Rate (JPY per USD)"
    unit: "JPY/USD"
  - id: "FEDFUNDS"
    description: "Federal Funds Rate"
    unit: "%"
  - id: "CPIAUCSL"
    description: "Consumer Price Index (Urban)"
    unit: "index"

analyzer:
  model: "claude-sonnet-4-6"
  max_articles_per_etf: 10
  max_summary_chars: 300
  temperature: 0.3

reporter:
  output_dir: "reports"
  date_format: "%Y-%m-%d"
